<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>離線 · 光合創學</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'PingFang TC', 'Noto Sans TC', system-ui, sans-serif;
      background: #0a0a0a;
      color: #e8e6e3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      text-align: center;
    }
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #0a0a0a;
      font-weight: bold;
      font-size: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 0 30px rgba(217, 119, 6, 0.3);
    }
    h1 { font-size: 24px; color: #fff; margin-bottom: 12px; font-weight: 700; }
    p { font-size: 14px; color: #9a9a9a; line-height: 1.6; margin-bottom: 24px; }
    button {
      background: #d97706;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      box-shadow: 0 0 16px rgba(217, 119, 6, 0.15);
    }
    button:hover { background: #b45309; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">光</div>
    <h1>目前離線</h1>
    <p>您的裝置目前沒有網路連線。<br />請檢查連線後重新載入。</p>
    <button onclick="location.reload()">重新載入</button>
  </div>
</body>
</html>
